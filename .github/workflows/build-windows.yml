name: Build Windows Plugin

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  OBS_VERSION: '30.2.3'
  PLUGIN_NAME: 'obs-streamear'

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download OBS binaries
        run: |
          $obsUrl = "https://github.com/obsproject/obs-studio/releases/download/${{ env.OBS_VERSION }}/OBS-Studio-${{ env.OBS_VERSION }}-Windows.zip"
          Invoke-WebRequest -Uri $obsUrl -OutFile obs-bin.zip
          Expand-Archive -Path obs-bin.zip -DestinationPath obs-sdk
          Get-ChildItem -Path obs-sdk -Recurse -Filter "obs.dll" | Select-Object -First 1 | ForEach-Object {
            Write-Host "Found OBS DLL at: $($_.FullName)"
          }

      - name: Download OBS source headers
        shell: bash
        run: |
          git clone --depth 1 --branch ${{ env.OBS_VERSION }} https://github.com/obsproject/obs-studio.git obs-src
          mkdir -p obs-sdk/include
          cp -r obs-src/libobs/* obs-sdk/include/
          ls obs-sdk/include/obs-module.h && echo "OBS headers ready"
          ls obs-sdk/include/util/c99defs.h && echo "OBS util headers ready"

      - name: Generate import library from DLL
        shell: pwsh
        run: |
          $obsDll = Get-ChildItem -Path obs-sdk -Recurse -Filter "obs.dll" | Select-Object -First 1
          $obsDir = $obsDll.DirectoryName
          Write-Host "Found DLL: $($obsDll.FullName)"

          # Use gendef (MSYS2) to generate .def from DLL
          & "C:\msys64\mingw64\bin\gendef.exe" "$($obsDll.FullName)"
          Move-Item -Force obs.def "$obsDir\obs.def"

          # Use MSVC lib.exe to generate import library
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          Import-Module "$vsPath\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath $vsPath -DevCmdArguments "-arch=amd64" -SkipAutomaticLocation
          lib /def:"$obsDir\obs.def" /out:"$obsDir\obs.lib" /machine:x64
          Write-Host "Generated import library: $obsDir\obs.lib"

      - name: Configure CMake
        shell: bash
        run: |
          MODULE_PATH="${GITHUB_WORKSPACE//\\//}/cmake"
          cmake -B build -G "Visual Studio 17 2022" -A ${{ matrix.arch }} \
            -DCMAKE_MODULE_PATH="$MODULE_PATH" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          $outDir = "release/${{ env.PLUGIN_NAME }}"
          New-Item -ItemType Directory -Force -Path "$outDir/bin/64bit"
          New-Item -ItemType Directory -Force -Path "$outDir/data/locale"
          
          # Copy DLL
          $dll = Get-ChildItem -Path build -Recurse -Filter "${{ env.PLUGIN_NAME }}.dll" | Select-Object -First 1
          if ($dll) {
            Copy-Item $dll.FullName "$outDir/bin/64bit/"
            Write-Host "Copied DLL: $($dll.FullName)"
          } else {
            Write-Host "WARNING: DLL not found!"
            Get-ChildItem -Path build -Recurse -Filter "*.dll" | ForEach-Object { Write-Host $_.FullName }
          }
          
          # Copy locale data
          if (Test-Path "data/locale") {
            Copy-Item "data/locale/*" "$outDir/data/locale/" -Recurse
          }
          
          # Copy README and LICENSE
          if (Test-Path "README.md") { Copy-Item "README.md" "$outDir/" }
          if (Test-Path "LICENSE") { Copy-Item "LICENSE" "$outDir/" }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-windows-${{ matrix.arch }}
          path: release/

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          Compress-Archive -Path "release/${{ env.PLUGIN_NAME }}" -DestinationPath "${{ env.PLUGIN_NAME }}-windows-${{ matrix.arch }}.zip"

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PLUGIN_NAME }}-windows-${{ matrix.arch }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
