name: Build Windows Plugin

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  OBS_VERSION: '32.0.4'
  PLUGIN_NAME: 'obs-streamear'

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download OBS binaries
        run: |
          $obsUrl = "https://github.com/obsproject/obs-studio/releases/download/${{ env.OBS_VERSION }}/OBS-Studio-${{ env.OBS_VERSION }}-Windows-x64.zip"
          Invoke-WebRequest -Uri $obsUrl -OutFile obs-bin.zip
          Expand-Archive -Path obs-bin.zip -DestinationPath obs-sdk
          Get-ChildItem -Path obs-sdk -Recurse -Filter "obs.dll" | Select-Object -First 1 | ForEach-Object {
            Write-Host "Found OBS DLL at: $($_.FullName)"
          }

      - name: Download OBS source headers
        shell: bash
        run: |
          git clone --depth 1 --branch ${{ env.OBS_VERSION }} https://github.com/obsproject/obs-studio.git obs-src
          mkdir -p obs-sdk/include
          cp -r obs-src/libobs/* obs-sdk/include/
          ls obs-sdk/include/obs-module.h && echo "OBS headers ready"
          ls obs-sdk/include/util/c99defs.h && echo "OBS util headers ready"
          # Copy frontend API header (moved to frontend/api/ in OBS 32.x)
          mkdir -p obs-sdk/include-frontend
          if [ -f obs-src/frontend/api/obs-frontend-api.h ]; then
            cp obs-src/frontend/api/obs-frontend-api.h obs-sdk/include-frontend/
          elif [ -f obs-src/UI/obs-frontend-api/obs-frontend-api.h ]; then
            cp obs-src/UI/obs-frontend-api/obs-frontend-api.h obs-sdk/include-frontend/
          else
            echo "ERROR: obs-frontend-api.h not found in either location"
            find obs-src -name "obs-frontend-api.h"
            exit 1
          fi
          ls obs-sdk/include-frontend/obs-frontend-api.h && echo "OBS frontend API header ready"

      - name: Generate import library from DLL
        shell: pwsh
        run: |
          pip install pefile

          $obsDll = Get-ChildItem -Path obs-sdk -Recurse -Filter "obs.dll" | Select-Object -First 1
          $obsDir = $obsDll.DirectoryName
          Write-Host "Found DLL: $($obsDll.FullName)"

          # Use pefile to extract exports and generate .def
          python -c @"
          import pefile, sys
          pe = pefile.PE(r'$($obsDll.FullName)')
          with open(r'$obsDir\obs.def', 'w') as f:
              f.write('LIBRARY obs\nEXPORTS\n')
              count = 0
              for exp in pe.DIRECTORY_ENTRY_EXPORT.symbols:
                  if exp.name:
                      f.write(f'  {exp.name.decode()}\n')
                      count += 1
              print(f'Extracted {count} exports')
          "@

          # Use MSVC lib.exe to generate import library
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          Import-Module "$vsPath\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath $vsPath -DevCmdArguments "-arch=amd64" -SkipAutomaticLocation
          lib /def:"$obsDir\obs.def" /out:"$obsDir\obs.lib" /machine:x64
          if (Test-Path "$obsDir\obs.lib") {
            Write-Host "Import library generated: $obsDir\obs.lib"
          } else {
            Write-Error "Failed to generate import library"
            exit 1
          }

          # Also generate import library for obs-frontend-api.dll
          $frontendDll = Get-ChildItem -Path obs-sdk -Recurse -Filter "obs-frontend-api.dll" | Select-Object -First 1
          if ($frontendDll) {
            $frontendDir = $frontendDll.DirectoryName
            Write-Host "Found frontend DLL: $($frontendDll.FullName)"
            python -c @"
          import pefile
          pe = pefile.PE(r'$($frontendDll.FullName)')
          with open(r'$frontendDir\obs-frontend-api.def', 'w') as f:
              f.write('LIBRARY obs-frontend-api\nEXPORTS\n')
              count = 0
              for exp in pe.DIRECTORY_ENTRY_EXPORT.symbols:
                  if exp.name:
                      f.write(f'  {exp.name.decode()}\n')
                      count += 1
              print(f'Extracted {count} frontend API exports')
          "@
            lib /def:"$frontendDir\obs-frontend-api.def" /out:"$frontendDir\obs-frontend-api.lib" /machine:x64
            if (Test-Path "$frontendDir\obs-frontend-api.lib") {
              Write-Host "Frontend API import library generated: $frontendDir\obs-frontend-api.lib"
            } else {
              Write-Error "Failed to generate frontend API import library"
              exit 1
            }
          } else {
            Write-Error "obs-frontend-api.dll not found in OBS SDK"
            exit 1
          }

      - name: Configure CMake
        shell: bash
        run: |
          MODULE_PATH="${GITHUB_WORKSPACE//\\//}/cmake"
          cmake -B build -G "Visual Studio 17 2022" -A ${{ matrix.arch }} \
            -DCMAKE_MODULE_PATH="$MODULE_PATH" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          $outDir = "release/${{ env.PLUGIN_NAME }}"
          New-Item -ItemType Directory -Force -Path "$outDir/bin/64bit"
          New-Item -ItemType Directory -Force -Path "$outDir/data/locale"
          
          # Copy DLL
          $dll = Get-ChildItem -Path build -Recurse -Filter "${{ env.PLUGIN_NAME }}.dll" | Select-Object -First 1
          if ($dll) {
            Copy-Item $dll.FullName "$outDir/bin/64bit/"
            Write-Host "Copied DLL: $($dll.FullName)"
          } else {
            Write-Host "WARNING: DLL not found!"
            Get-ChildItem -Path build -Recurse -Filter "*.dll" | ForEach-Object { Write-Host $_.FullName }
          }
          
          # Copy locale data
          if (Test-Path "data/locale") {
            Copy-Item "data/locale/*" "$outDir/data/locale/" -Recurse
          }
          
          # Copy README and LICENSE
          if (Test-Path "README.md") { Copy-Item "README.md" "$outDir/" }
          if (Test-Path "LICENSE") { Copy-Item "LICENSE" "$outDir/" }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-windows-${{ matrix.arch }}
          path: release/

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          Compress-Archive -Path "release/${{ env.PLUGIN_NAME }}" -DestinationPath "${{ env.PLUGIN_NAME }}-windows-${{ matrix.arch }}.zip"

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PLUGIN_NAME }}-windows-${{ matrix.arch }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
